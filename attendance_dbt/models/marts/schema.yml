# models/marts/schema.yml
version: 2

models:
  - name: mart_ada
    description: "Average Daily Attendance metrics aggregated by school"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          strictly: false
    columns:
      - name: school_id
        tests:
          - unique
          - not_null
      - name: ada_pct
        description: "Attendance rate as a percentage (0-100)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: mart_truancy
    description: "Truancy and chronic absenteeism flags by student and school"
    columns:
      - name: student_id
        tests:
          - not_null
      - name: is_chronically_absent
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
