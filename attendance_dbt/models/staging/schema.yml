# models/staging/schema.yml
version: 2

models:
  - name: stg_attendance
    description: "Cleaned and typed attendance records from raw S3 source"
    columns:

      - name: attendance_sk
        description: "Surrogate key — md5 hash of student_id + school_id + date"
        tests:
          - unique
          - not_null

      - name: student_id
        description: "Unique identifier for each student"
        tests:
          - not_null

      - name: school_id
        description: "Unique identifier for each school"
        tests:
          - not_null

      - name: is_present
        description: "1 if student was present, 0 if absent"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false

      - name: is_enrolled
        description: "1 if student was enrolled on this date, 0 if not"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false

      - name: attendance_date
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "cast('2020-01-01' as date)"
              max_value: "current_date"
              row_condition: "is_enrolled = 1"
