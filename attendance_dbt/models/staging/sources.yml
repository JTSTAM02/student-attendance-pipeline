version: 2

sources:
  - name: attendance_raw
    database: awsdatacatalog
    schema: attendance_db
    tables:
      - name: raw_attendance
        description: "Raw daily attendance records from source system"
        columns:
          - name: student_id
            description: "Unique student identifier"
          - name: school_id
            description: "Unique school identifier"
          - name: date
            description: "Date of attendance record"
          - name: present
            description: "1 if student was present, 0 if absent"
          - name: enrolled
            description: "1 if student was enrolled that day"
