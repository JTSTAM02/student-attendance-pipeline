# models/intermediate/schema.yml
version: 2

models:
  - name: int_attendance_daily
    description: "Daily attendance flags per student with business logic applied"

    columns:
      - name: attendance_sk
        description: "Surrogate key carried through from staging"
        tests:
          - unique
          - not_null

      - name: student_id
        tests:
          - not_null

      - name: school_id
        tests:
          - not_null

      - name: is_present
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]	
              quote: false

      - name: is_absent
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false

      - name: is_truant
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false

      - name: is_enrolled
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false

      - name: attendance_date
        tests:
          - not_null

    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["student_id", "attendance_date"]
          row_condition: "attendance_date >= current_date - interval '7' day"

      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          strictly: false
          config:
            severity: warn
