name: 'attendance_dbt'
version: '1.0.0'
config-version: 2

profile: 'attendance_dbt'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  attendance_dbt:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

seeds:
  attendance_dbt:
    school_calendar_2024:
      +column_types:
        date: date
        is_instructional: integer
